# Dependency snippet for the flutter-android house stack.
# Merge the `dependencies:` and `dev_dependencies:` blocks into your project's
# pubspec.yaml (do NOT add a second top-level key).
#
# Constraints are pinned to recent stable lines as of mid-2026. After merging:
#   flutter pub get
#   flutter pub upgrade --major-versions   # take current stable, then re-pin to what resolves
# Always commit the resulting pubspec.lock.

dependencies:
  flutter:
    sdk: flutter

  # State management + DI (skill 08)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing (skill 07)
  go_router: ^14.6.0

  # Immutable models / unions (used by domain entities + data DTOs)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking (skill 11 / 14)
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen runner + generators
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Lints (wired by analysis_options.yaml)
  very_good_analysis: ^7.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Testing fakes/mocks (skill 20)
  mocktail: ^1.0.4

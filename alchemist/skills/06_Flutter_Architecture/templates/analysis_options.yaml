# Strict, opinionated analysis for the flutter-android house style.
# See ../../../references/CONVENTIONS.md — very_good_analysis is the baseline.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # custom_lint powers riverpod_lint's rules (provider scope, ref usage, etc.).
  plugins:
    - custom_lint

  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Generated code must always be present for the analyzer; keep these loud.
    missing_required_param: error
    missing_return: error
    # TODOs are allowed during a stage but must be resolved (or issue-linked) before DoD.
    todo: ignore

  exclude:
    # Generated artifacts — never hand-edit, never lint.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gen.dart"        # flutter_gen assets/colors/fonts
    - "**/*.config.dart"
    - "**/*.mocks.dart"
    - "lib/generated/**"
    - "build/**"
    - ".dart_tool/**"

linter:
  rules:
    # very_good_analysis covers most of this; the few below state house intent explicitly.
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    require_trailing_commas: true
    avoid_print: true                 # use `logger` instead (skill 23)
    use_build_context_synchronously: true
    # We rely on Riverpod, not BuildContext, for state — discourage stray globals.
    avoid_dynamic_calls: true
    public_member_api_docs: true      # doc comments on public APIs (DoD)

# ─────────────────────────────────────────────────────────────────────────
# Asset / font / icon / splash configuration — paste into your pubspec.yaml.
# Replace <placeholders> and adjust paths to match your assets/ tree.
# Run after editing:
#   dart run build_runner build --delete-conflicting-outputs   # flutter_gen
#   dart run flutter_launcher_icons
#   dart run flutter_native_splash:create
# ─────────────────────────────────────────────────────────────────────────

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0            # render SVGs
  cached_network_image: ^3.3.0  # disk-cached remote images

dev_dependencies:
  build_runner: ^2.4.0
  flutter_gen_runner: ^5.4.0      # generates lib/gen/assets.gen.dart + fonts.gen.dart
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# ── Bundled assets & fonts ──────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    # Declare DIRECTORIES (trailing slash) so new files ship automatically.
    # Resolution variants in 2.0x/ and 3.0x/ are picked up under these dirs.
    - assets/images/
    - assets/icons/

  fonts:
    - family: <Inter>                         # referenced by skill 04 typography tokens
      fonts:
        - asset: assets/fonts/<Inter-Regular.ttf>
        - asset: assets/fonts/<Inter-Medium.ttf>
          weight: 500
        - asset: assets/fonts/<Inter-Bold.ttf>
          weight: 700

# ── flutter_gen: type-safe Assets / Fonts classes ──────────────────────────
flutter_gen:
  output: lib/gen/            # -> lib/gen/assets.gen.dart, lib/gen/fonts.gen.dart
  line_length: 80
  integrations:
    flutter_svg: true         # emit .svg() helpers for SVG assets
    image: true               # emit .image()/.provider() helpers for raster
  assets:
    enabled: true
  fonts:
    enabled: true

# ── flutter_launcher_icons: adaptive Android icon ──────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  min_sdk_android: 23
  # Adaptive layers (foreground floats over background, OS masks to shape):
  adaptive_icon_foreground: "assets/branding/<icon_foreground.png>"
  adaptive_icon_background: "#0B5FFF"                 # flat color OR an asset path
  adaptive_icon_monochrome: "assets/branding/<icon_monochrome.png>"  # Android 13 themed icons
  # Legacy fallback for pre-adaptive launchers:
  image_path: "assets/branding/<icon_legacy.png>"
  remove_alpha_ios: true

# ── flutter_native_splash: Android 12+ splash API + legacy ────────────────
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0B0B0F"
  image: "assets/branding/<splash_logo.png>"         # legacy (pre-Android 12) centered image
  image_dark: "assets/branding/<splash_logo.png>"
  android_12:
    # Centered icon masked into a circle; NOT a full-bleed image.
    image: "assets/branding/<splash_logo.png>"
    color: "#FFFFFF"
    color_dark: "#0B0B0F"
  android: true
  ios: true
  # Match these colors to the launcher background for a seamless cold start.

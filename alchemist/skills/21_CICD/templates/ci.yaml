# .github/workflows/ci.yaml
# Verify workflow: runs on every PR and push to main.
# Stages: format -> analyze -> test+coverage -> debug build. No signing secrets needed.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (format / analyze / test / build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pin a known-good version and also track the channel to catch SDK regressions early.
        flutter: ['3.x.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Android build toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ matrix.flutter }}
          cache: true

      - name: Cache pub and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-pub-gradle-${{ hashFiles('**/pubspec.lock', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-pub-gradle-

      - name: Install dependencies
        run: flutter pub get

      # If you use codegen (freezed/json/riverpod), uncomment:
      # - name: Generate code
      #   run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (very_good_analysis)
        run: flutter analyze --fatal-infos

      - name: Test with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      # Smoke-test the Android build wiring. Debug APK uses the auto-generated debug key (no secrets).
      - name: Build debug APK
        run: flutter build apk --debug
